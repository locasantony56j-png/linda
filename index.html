<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/883/883356.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/883/883356.png" />
    <title>Bristy Health Care | Medical Assistant</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; color: #10b981; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
        <div style="text-align: center; animation: fadeIn 0.8s ease-out;">
          <div style="position: relative; width: 80px; height: 80px; margin: 0 auto 32px;">
            <div style="position: absolute; inset: 0; border: 4px solid rgba(16, 185, 129, 0.1); border-radius: 24px;"></div>
            <div style="position: absolute; inset: 0; border: 4px solid #10b981; border-top-color: transparent; border-radius: 24px; animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;"></div>
            <img src="https://cdn-icons-png.flaticon.com/512/883/883356.png" style="position: absolute; inset: 16px; width: 48px; height: 48px; object-fit: contain;" alt="Logo" />
          </div>
          <h1 style="font-size: 24px; font-weight: 900; letter-spacing: -0.02em; margin: 0; background: linear-gradient(to right, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Bristy Health Care</h1>
          <p style="color: #4b5563; font-size: 14px; margin-top: 12px; font-weight: 500; letter-spacing: 0.05em;">INITIALIZING MEDICAL CORE...</p>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
